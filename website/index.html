<!DOCTYPE html>
<html lang="en">

<head>
    <title>Chat</title>
    <link rel="stylesheet" href="src/styles.css">
</head>

<body>
    <div id="container">
        <div id="navigation">
            <div id="navContainer">
                <h1>Chat</h1>
                <div class="navItem" id="roomInfo">
                    <form id="roomForm">
                        <input type="number" id="roomInput" placeholder="Enter roomcode">
                        <button type="submit" id="joinRoom">Join</button>
                    </form>
                </div>
                <div class="navItem" id="inRoomInfo">
                    <pre>Room: <label id="roomDisplay">[NO ROOM]</label>  </pre>
                    <button id="leaveRoom">Leave</button>
                </div>
            </div>
        </div>
        <div id="chat">
            <div id="messages">

            </div>
            <div id="inputArea">
                <form id="inputForm">
                    <button id="emojiInput">Insert</button>
                    <input type="text" id="chatInput">
                    <button type="submit" id="send">Send</button>
                </form>
            </div>
        </div>
    </div>
    <script src="src/script.js"></script>
</body>

</html>
